<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHINMAI J | Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --dark-bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            scroll-behavior: smooth;
        }

        /* Fix 1: Added standard background-clip for compatibility */
        .brand-box {
            font-weight: 800;
            letter-spacing: 2px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
        }

        /* Fix 2: Moved inline color to CSS class */
        .hero-highlight {
            color: #a855f7;
        }

        .hero-section {
            background: var(--dark-bg);
            color: white;
            padding: 100px 0;
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%);
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #6366f1;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .nav-link { color: #94a3b8 !important; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #6366f1 !important; }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: var(--primary-gradient);
            margin: 10px auto;
            border-radius: 2px;
        }

        .edu-card { transition: all 0.3s ease; border: 1px solid #e2e8f0 !important; }
        .edu-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        .btn-custom {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .contact-link {
            text-decoration: none;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            transition: 0.2s;
        }
        .contact-link:hover { color: #6366f1; }
    </style>
</head>

<body>

    <header class="sticky-top bg-white shadow-sm">
        <div class="container py-3 d-flex justify-content-between align-items-center">
            <div class="brand-box">CHINMAI J</div>
            <nav class="nav">
                <a class="nav-link active" href="#hero">Home</a>
                <a class="nav-link" href="#about">About</a>
                <a class="nav-link" href="#education">Education</a>
                <a class="nav-link" href="#contact">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        <section id="hero" class="hero-section text-center">
            <div class="container">
                <img src="assets/images/profile.jpg" alt="Chinmai J" class="profile-img shadow">
                <h1 class="display-4 fw-bold">Hi, I'm <span class="hero-highlight">Chinmai J</span></h1>
                <p class="lead opacity-75">Web Developer | CSE Student</p>
                <div class="mt-4">
                    <a href="pages/projects.html" class="btn btn-custom">View My Work</a>
                </div>
            </div>
        </section>

        <section id="contact" class="py-5">
            <div class="container text-center">
                <h2 class="section-title">Let's Connect</h2>
                <div class="row justify-content-center mt-4">
                    <div class="col-md-4">
                        <div class="bg-white p-4 rounded-4 shadow-sm text-start">
                            <a href="https://linkedin.com/in/chinmaicj1610/" target="_blank" rel="noopener" class="contact-link">
                                <i class="fab fa-linkedin text-primary"></i> LinkedIn
                            </a>
                            <a href="https://github.com/in/Chinmai1610/" target="_blank" rel="noopener" class="contact-link">
                                <i class="fab fa-github text-dark"></i> GitHub
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center py-4 bg-dark text-white-50">
        <p class="mb-0 small">© 2026 CHINMAI J</p>
    </footer>

</body>
</html>
